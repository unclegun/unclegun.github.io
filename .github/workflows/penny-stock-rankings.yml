name: Penny Stock Rankings

on:
  schedule:
    # Run weekdays at 08:30 UTC (≈ 4:30 AM ET – before US market open)
    - cron: "30 8 * * 1-5"
  workflow_dispatch:

jobs:
  generate:
    name: Generate Rankings
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests pandas

      - name: Generate penny-stock rankings
        run: python scripts/penny_stock_ranker/generate_rankings.py

      - name: Commit and push updated rankings
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/penny-stock-rankings.json data/penny-stock-history/
          git commit -m "Auto-update penny-stock rankings [skip ci]" || echo "No changes to commit"
          git push origin main
