<div class="animated-logo">
  <svg
    class="logo"
    viewBox="0 0 1536 609"
    role="img"

    <title id="logoTitle">StrataStack Solutions</title>

    <desc id="logoDescription">

    </desc>

    <defs>
      <linearGradient id="topLayerGradient" x1="0" y1="0" x2="1" y2="1">

      <linearGradient id="middleLayerGradient" x1="0" y1="0" x2="1" y2="0">

      <linearGradient id="bottomLayerGradient" x1="0" y1="0" x2="1" y2="0">

          H 387

      <path

        stroke-width="17"

      />

      <path
        class="stack-layer stack-bottom"
        d="
          M 38 502
          H 607
          V 552

      <text

      <text
